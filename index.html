<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Refuturiza 360</title>
<style>
  :root{
    --orange:#F84001; --green-dark:#024632; --ink:#322F2E; --bg:#FAF7F3;
    --font-h:'Nunito','Poppins',sans-serif;
    --font-b:'Poppins','Inter',sans-serif;
  }
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-b);display:flex;align-items:center;justify-content:center;height:100vh}
  .login-card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.05);width:100%;max-width:400px;text-align:center}
  .wordmark{font-family:var(--font-h);font-weight:900;font-size:28px;margin-bottom:8px}
  .wordmark b{color:var(--orange)}
  .tagline{font-size:12px;color:#6f5f4f;text-transform:uppercase;letter-spacing:1px;margin-bottom:32px}
  form{display:flex;flex-direction:column;gap:16px;text-align:left}
  label{font-size:12px;font-weight:700;color:var(--green-dark)}
  input{padding:12px;border:1px solid #ece6de;border-radius:8px;font-family:inherit;font-size:14px}
  .btn{background:var(--orange);color:#fff;border:0;border-radius:8px;padding:14px;font-weight:700;cursor:pointer;margin-top:8px}
  .error{color:#e52f2d;font-size:12px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="wordmark">re<b>futuriza</b> 360</div>
  <div class="tagline">Portal de Customer Success</div>
  <form id="loginForm">
    <label>Usuário</label>
    <input type="text" id="username" required placeholder="admin">
    <label>Senha</label>
    <input type="password" id="password" required placeholder="•••">
    <button type="submit" class="btn">Entrar</button>
    <div id="errorMsg" class="error">Usuário ou senha incorretos.</div>
  </form>
</div>
<script>
document.getElementById('loginForm').onsubmit = (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  
  // Validação estática direta via Frontend
  if (username === 'admin' && password === '123') {
    window.location.href = 'cs-dashboard.html';
  } else {
    errorMsg.style.display = 'block';
  }
};
</script>
</body>
</html>
